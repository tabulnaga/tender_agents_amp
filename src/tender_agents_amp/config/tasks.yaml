collect_purchase_context:
  description: >
    Given a purchase request, summarize the requester, amount,
    vendor, purpose, urgency, and any known risks.
    Return a short structured summary.

    Use these inputs when available:
    - purchase_request_id
    - requester
    - vendor
    - amount_usd
    - currency
    - purpose
    - urgency
    - reviewer_user_id
    - reviewer_email
  expected_output: >
    A structured summary containing purchase_request_id, requester,
    vendor, amount_usd, currency, purpose, urgency, risk_notes,
    and recommendation.
  agent: research_agent

prepare_human_review_pack:
  description: >
    Turn the structured summary into a manager-friendly review pack.
    Keep it concise and clear. Include what is being requested,
    why it is needed, the recommendation, and any review notes.

    This task requires Human-in-the-Loop approval.

    When human approval is required, send the HITL request to the
    configured backend endpoint /webhooks/crewai-hitl.

    After the human approves from the backend approval screen,
    the backend endpoint /approvals/approve will resume the workflow.
  expected_output: >
    A final approval pack containing request summary, recommendation,
    risk notes, and reviewer guidance, ready for human approval.
  agent: approval_agent